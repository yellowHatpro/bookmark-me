services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bookmark}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bookmark}
      POSTGRES_DB: ${POSTGRES_DB:-bookmark}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bookmark}"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-bookmark}:${POSTGRES_PASSWORD:-bookmark}@db:5432/${POSTGRES_DB:-bookmark}
      APP_FERNET_KEY: ${APP_FERNET_KEY}
      SYNC_INTERVAL_MIN: ${SYNC_INTERVAL_MIN:-15}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      X_BOOKMARKS_QUERY_ID: ${X_BOOKMARKS_QUERY_ID:-}
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./migrations:/app/migrations
      - ./alembic.ini:/app/alembic.ini
    command: >
      sh -c "uv run alembic upgrade head &&
             uv run uvicorn app.main:app --host 0.0.0.0 --port 8000"

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8000}
    ports:
      - "3000:3000"
    volumes:
      - ./ui:/app
      - /app/node_modules
      - /app/.next
    command: pnpm dev -p 3000

volumes:
  postgres-data:
